<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registrar mi negocio</title>
<link rel="stylesheet" href="css/styles.css" />

<div class="contenedor-auth">
  <div class="tarjeta">
    <h1>Registrar mi negocio</h1>
    <p class="subtitulo">Creá tu cuenta de administrador. Después vas a poder invitar empleados.</p>

    <p class="mensaje-error" id="error" hidden></p>

    <form id="form-registro">
      <div class="campo">
        <label for="nombre-negocio">Nombre del local</label>
        <input type="text" id="nombre-negocio" required placeholder="Ej: Almacén Don Juan" />
      </div>
      <div class="campo">
        <label for="nombre-admin">Tu nombre</label>
        <input type="text" id="nombre-admin" required />
      </div>
      <div class="campo">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username" />
      </div>
      <div class="campo">
        <label for="telefono">Teléfono (opcional)</label>
        <input type="tel" id="telefono" />
      </div>
      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required minlength="6" autocomplete="new-password" />
      </div>
      <button type="submit" class="boton-primario" id="btn-submit">Crear mi cuenta</button>
    </form>

    <div class="enlaces">
      <a href="index.html">Ya tengo cuenta, iniciar sesión</a>
    </div>
  </div>
</div>

<script type="module">
  import { registrarOrganizacion } from './js/auth.js';
  import { mostrarError, mostrarCargando, traducirError } from './js/utils.js';

  const form = document.getElementById('form-registro');
  const errorEl = document.getElementById('error');
  const btnSubmit = document.getElementById('btn-submit');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    mostrarError(errorEl, '');
    mostrarCargando(btnSubmit, true, 'Crear mi cuenta');

    const { error } = await registrarOrganizacion({
      nombreNegocio: document.getElementById('nombre-negocio').value.trim(),
      nombreAdmin: document.getElementById('nombre-admin').value.trim(),
      email: document.getElementById('email').value.trim(),
      telefono: document.getElementById('telefono').value.trim(),
      password: document.getElementById('password').value,
    });

    if (error) {
      mostrarError(errorEl, traducirError(error));
      mostrarCargando(btnSubmit, false, 'Crear mi cuenta');
      return;
    }

    window.location.href = 'panel.html';
  });
</script>
