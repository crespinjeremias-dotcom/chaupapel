<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iniciar sesión</title>
<link rel="stylesheet" href="css/chaupapel.css" />

<div class="contenedor-auth">
  <div class="tarjeta">
    <h1>Iniciar sesión</h1>
    <p class="subtitulo">Accedé a tu cuenta del local.</p>

    <p class="mensaje-error" id="error" hidden></p>

    <div class="aviso" id="aviso-sesion" hidden>
      Ya había una sesión abierta en otro dispositivo.
      <div class="acciones">
        <button type="button" id="btn-cerrar-anterior">Cerrar sesión anterior y continuar</button>
        <button type="button" id="btn-mantener-ambas">Mantener ambas y continuar</button>
      </div>
    </div>

    <form id="form-login">
      <div class="campo">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username" />
      </div>
      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="boton-primario" id="btn-submit">Iniciar sesión</button>
    </form>

    <div class="enlaces">
      <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
      <a href="registro.html">¿No tenés cuenta? Registrar mi negocio</a>
      <a href="empleado.html">¿Tenés un código de invitación? Registrate como empleado</a>
    </div>
  </div>
</div>

<script type="module">
  import {
    login,
    registrarSesionActual,
    cerrarSesionesAnteriores,
    obtenerUsuarioActual,
    obtenerSuperAdminActual,
    pantallaDeEntrada,
  } from './js/auth.js';
  import { mostrarError, mostrarCargando, traducirError } from './js/utils.js';

  const form = document.getElementById('form-login');
  const errorEl = document.getElementById('error');
  const avisoSesion = document.getElementById('aviso-sesion');
  const btnSubmit = document.getElementById('btn-submit');

  // El Super-Admin no tiene fila en `usuarios` (no pertenece a ninguna
  // organizacion), asi que se chequea aparte y primero -- si se lo dejara
  // caer en la logica normal, pantallaDeEntrada() con usuario=null lo
  // mandaria de vuelta a index.html (loop de login).
  async function irAPantallaDeEntrada() {
    const superAdmin = await obtenerSuperAdminActual();
    if (superAdmin) {
      window.location.href = 'superadmin.html';
      return;
    }
    const usuario = await obtenerUsuarioActual();
    window.location.href = pantallaDeEntrada(usuario);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    mostrarError(errorEl, '');
    mostrarCargando(btnSubmit, true, 'Iniciar sesión');

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { error } = await login(email, password);
    if (error) {
      mostrarError(errorEl, traducirError(error));
      mostrarCargando(btnSubmit, false, 'Iniciar sesión');
      return;
    }

    try {
      const huboSesionPrevia = await registrarSesionActual();
      if (huboSesionPrevia) {
        form.hidden = true;
        avisoSesion.hidden = false;
        return;
      }
    } catch {
      // si falla el chequeo de sesion unica, no bloqueamos el login por eso
    }

    await irAPantallaDeEntrada();
  });

  document.getElementById('btn-cerrar-anterior').addEventListener('click', async () => {
    await cerrarSesionesAnteriores();
    await irAPantallaDeEntrada();
  });

  document.getElementById('btn-mantener-ambas').addEventListener('click', async () => {
    await irAPantallaDeEntrada();
  });
</script>
